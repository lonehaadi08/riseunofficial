name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # This works perfectly and saves tons of time!

      - name: ☕ Setup Java (Android SDK requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          # Removed Gradle cache because Expo creates the Android files later in the script

      - name: 🔐 Create .env file for the APK
        run: |
          echo "EXPO_PUBLIC_GEMINI_API_KEY=${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_GROQ_API_KEY=${{ secrets.EXPO_PUBLIC_GROQ_API_KEY }}" >> .env

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Unpack Expo to Native Android
        run: npx expo prebuild --platform android --clean

      - name: 🔨 Compile APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 🚀 Upload APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: DigiKashmiri-APK
          path: android/app/build/outputs/apk/release/app-release.apk